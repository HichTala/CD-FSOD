_BASE_: "../Base-RCNN-FPN.yaml"
MODEL:
  META_ARCHITECTURE: "TwoStagePseudoLabGeneralizedRCNN"
  WEIGHTS: "pretrained/r50_dota_background.pkl"
  MASK_ON: False
  RESNETS:
    DEPTH: 50
  PROPOSAL_GENERATOR:
    NAME: "PseudoLabRPN"
  RPN:
    POSITIVE_FRACTION: 0.33
    LOSS_WEIGHT: 1.0
    LOSS: "CrossEntropy"
  ROI_HEADS:
    NUM_CLASSES: 20
    NAME: "StandardROIHeadsPseudoLab"
    LOSS: "FocalLoss"
SOLVER:
  IMS_PER_BATCH: 4
  LR_SCHEDULER_NAME: "WarmupMultiStepLR"
  STEPS: (3000, )
  MAX_ITER: 4000
  IMG_PER_BATCH_LABEL: 4
  BASE_LR: 0.0025
DATASETS:
  TRAIN: ('dior_1shot',)
  VAL: ('dior_val',)
  TEST: ('dior_test',)
KD:
  BURN_UP_STEP: 2000
  BBOX_THRESHOLD: 0.5
  TEACHER_UPDATE_ITER: 1
  EMA_KEEP_RATE: 0.9996
  LOSS_WEIGHT: 2.0
OUTPUT_DIR: "checkpoints/dior/1shot"
TEST:
  EVAL_PERIOD: 2000